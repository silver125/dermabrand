<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dermabrand — O Dossiê Estratégico Premium</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --obsidian: #050505;
      --onyx: #0A0A0C;
      --charcoal: #141416;
      --silver: #EAEAEA;
      --muted-silver: #A3A3A3;
      --rose-gold: #D8AFA9;
      --rose-gold-dark: #A37F79;
      --champagne: #F2E8D5;
      --gold-foil: #CFA665;
      --error-wine: #6B2323;
      --glass-bg: rgba(20, 20, 22, 0.4);
      --glass-border: rgba(255, 255, 255, 0.04);
      --glass-border-hover: rgba(216, 175, 169, 0.25);
      --shadow-ambient: 0 30px 60px rgba(0, 0, 0, 0.8);
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Outfit', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--obsidian);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(216, 175, 169, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(207, 166, 101, 0.03) 0%, transparent 50%);
      color: var(--silver);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
      overflow-x: hidden;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(30px); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    @keyframes fade { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(216, 175, 169, 0); }
      50% { box-shadow: 0 0 25px rgba(216, 175, 169, 0.15); }
    }
    @keyframes spinDelay {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 3rem 0 2rem;
      text-align: center;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .brand-mark {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #FFFFFF;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .brand-sub {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.4em;
      color: var(--rose-gold);
      text-transform: uppercase;
    }

    .search-section {
      margin: 3rem auto;
      max-width: 700px;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
      opacity: 0;
    }

    .search-orb {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-ambient);
      transition: all 0.4s ease;
    }

    .search-orb:focus-within {
      border-color: rgba(216, 175, 169, 0.4);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 1.1rem;
      font-family: var(--font-sans);
      color: var(--champagne);
      outline: none;
      letter-spacing: 0.03em;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .btn-search {
      background: var(--rose-gold);
      border: none;
      color: var(--obsidian);
      padding: 0.8rem 2rem;
      border-radius: 30px;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-search:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(216, 175, 169, 0.3);
    }

    .btn-search:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-ring {
      display: none;
      text-align: center;
      margin: 3rem 0;
      animation: fade 0.6s ease;
    }

    .orb-spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 1.5rem;
      border: 2px solid var(--glass-border);
      border-top-color: var(--rose-gold);
      border-radius: 50%;
      animation: spinDelay 1.2s linear infinite;
    }

    .status-text {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-style: italic;
      color: var(--champagne);
      letter-spacing: 0.05em;
    }

    .form-panel {
      display: none;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 3rem;
      border-radius: 12px;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-ambient);
      margin: 3rem auto;
      max-width: 700px;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .panel-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .panel-header h2 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      color: var(--champagne);
      margin-bottom: 0.5rem;
      font-weight: 300;
    }

    .panel-header p {
      font-size: 0.8rem;
      color: var(--muted-silver);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .lux-field {
      margin-bottom: 1.5rem;
    }

    .lux-field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted-silver);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.6rem;
    }

    .lux-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: none;
      border-bottom: 1px solid var(--glass-border);
      padding: 0.8rem 0;
      font-family: var(--font-sans);
      font-size: 1rem;
      color: var(--champagne);
      transition: all 0.3s ease;
      outline: none;
    }

    .lux-input::placeholder {
      color: rgba(255, 255, 255, 0.1);
    }

    .lux-input:focus {
      border-bottom-color: var(--rose-gold);
      background: linear-gradient(to top, rgba(216, 175, 169, 0.03), transparent);
    }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
    }

    .tags-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 1rem;
    }

    .tag-btn {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--muted-silver);
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tag-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--silver);
    }

    .tag-btn.selected {
      background: var(--rose-gold);
      border-color: var(--rose-gold);
      color: var(--obsidian);
      font-weight: 600;
    }

    .btn-submit-container {
      text-align: center;
      margin-top: 2.5rem;
    }

    .btn-grand {
      background: var(--rose-gold);
      color: var(--obsidian);
      border: none;
      padding: 1rem 3rem;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 30px rgba(216, 175, 169, 0.1);
      text-transform: uppercase;
    }

    .btn-grand:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(216, 175, 169, 0.25);
    }

    .btn-grand:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .profile-hero {
      display: none;
      text-align: center;
      margin: 4rem 0;
      animation: fadeUp 1s ease forwards;
    }

    .avatar-frame {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      padding: 4px;
      border: 2px solid var(--rose-gold-dark);
      background: rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .avatar-letter {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 3rem;
      color: var(--rose-gold);
    }

    .ph-name {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      color: var(--champagne);
      margin-bottom: 0.3rem;
      font-weight: 300;
    }

    .ph-meta {
      font-size: 0.85rem;
      color: var(--rose-gold-dark);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .ph-bio {
      margin: 0 auto;
      max-width: 600px;
      font-weight: 300;
      font-size: 0.95rem;
      color: var(--muted-silver);
    }

    .dossier-view {
      display: none;
      margin-bottom: 6rem;
    }

    .editorial-divider {
      text-align: center;
      margin: 4rem 0 3rem;
      font-family: var(--font-serif);
      font-size: 1rem;
      font-style: italic;
      color: var(--rose-gold-dark);
      letter-spacing: 0.3em;
    }

    .editorial-divider::before,
    .editorial-divider::after {
      content: "—";
      margin: 0 1rem;
      opacity: 0.3;
    }

    .report-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .report-card {
      background: linear-gradient(145deg, rgba(20, 20, 22, 0.6), rgba(10, 10, 12, 0.8));
      border: 1px solid var(--glass-border);
      border-left: 3px solid transparent;
      padding: 2.5rem;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .report-card:nth-child(1) { animation-delay: 0s; }
    .report-card:nth-child(2) { animation-delay: 0.1s; }
    .report-card:nth-child(3) { animation-delay: 0.2s; }
    .report-card:nth-child(4) { animation-delay: 0.3s; }
    .report-card:nth-child(5) { animation-delay: 0.4s; }
    .report-card:nth-child(6) { animation-delay: 0.5s; }
    .report-card:nth-child(7) { animation-delay: 0.6s; }

    .report-card:hover {
      border-left-color: var(--rose-gold);
      background: rgba(20, 20, 22, 0.8);
    }

    .rc-title {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      font-family: var(--font-serif);
      font-size: 1.3rem;
      color: var(--champagne);
      font-weight: 400;
    }

    .rc-number {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(216, 175, 169, 0.1);
      border: 1px solid var(--rose-gold-dark);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--rose-gold);
    }

    .rc-body {
      font-size: 0.95rem;
      color: var(--silver);
      line-height: 1.8;
    }

    .rc-body strong {
      color: var(--champagne);
      font-weight: 600;
    }

    .rc-body em {
      color: var(--rose-gold);
      font-style: italic;
    }

    .whatsapp-cta {
      text-align: center;
      margin-top: 4rem;
      padding-top: 3rem;
      border-top: 1px solid var(--glass-border);
    }

    .whatsapp-cta p {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--rose-gold);
      margin-bottom: 1.5rem;
      font-style: italic;
      line-height: 1.6;
    }

    .whatsapp-btn {
      display: inline-block;
      background: linear-gradient(135deg, #F3C669 0%, #D4A33B 100%);
      color: #000000;
      text-decoration: none;
      padding: 0.8rem 2.5rem;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.85rem;
      text-align: center;
      letter-spacing: 0.1em;
      transition: all 0.4s ease;
      box-shadow: 0 5px 15px rgba(212, 163, 59, 0.3);
      text-transform: uppercase;
    }

    .whatsapp-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 163, 59, 0.5);
    }

    .error-box {
      display: none;
      background: rgba(107, 35, 35, 0.2);
      border: 1px solid var(--error-wine);
      color: #FF6B6B;
      padding: 1.5rem;
      border-radius: 8px;
      margin: 2rem auto;
      max-width: 700px;
      text-align: center;
      font-size: 0.95rem;
      animation: fadeUp 0.5s ease;
    }

    footer {
      text-align: center;
      padding: 3rem 0;
      font-size: 0.8rem;
      color: var(--muted-silver);
      letter-spacing: 0.1em;
      border-top: 1px solid var(--glass-border);
      margin-top: 6rem;
    }

    @media (max-width: 768px) {
      .form-grid-2,
      .form-grid-3 {
        grid-template-columns: 1fr;
      }

      .brand-mark {
        font-size: 2rem;
      }

      .ph-name {
        font-size: 1.8rem;
      }

      .form-panel {
        padding: 2rem;
      }

      .rc-title {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand-mark">DERMABRAND</div>
      <div class="brand-sub">O Dossiê Estratégico</div>
    </header>

    <div class="search-section" id="searchBox">
      <div class="search-orb">
        <span style="color: var(--rose-gold); font-weight: 600;">@</span>
        <input
          type="text"
          class="search-input"
          id="igInput"
          placeholder="Digite o username do perfil"
          autocomplete="off"
        />
        <button class="btn-search" id="btnSearch" onclick="fetchProfileData()">Analisar</button>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="status-ring" id="progressSection">
      <div class="orb-spinner"></div>
      <p class="status-text" id="progressLabel">Adquirindo dados...</p>
    </div>

    <div class="form-panel" id="formSection">
      <div class="panel-header">
        <h2>Enriqueça os Dados</h2>
        <p>Informações complementares para análise mais profunda</p>
      </div>

      <div class="lux-field">
        <label>Nome Completo</label>
        <input type="text" class="lux-input" id="fName" placeholder="Nome do profissional" />
      </div>

      <div class="lux-field">
        <label>Especialidade</label>
        <input type="text" class="lux-input" id="fSpecialty" placeholder="Ex: Dermatologista" />
      </div>

      <div class="form-grid-2">
        <div class="lux-field">
          <label>Cidade</label>
          <input type="text" class="lux-input" id="fCity" placeholder="Ex: São Paulo" />
        </div>
        <div class="lux-field">
          <label>Bio do Perfil</label>
          <input type="text" class="lux-input" id="fBio" placeholder="Bio atual" />
        </div>
      </div>

      <div class="form-grid-3">
        <div class="lux-field">
          <label>Seguidores</label>
          <input type="number" class="lux-input" id="fFollowers" placeholder="Ex: 5000" />
        </div>
        <div class="lux-field">
          <label>Curtidas (Aprox)</label>
          <input type="text" class="lux-input" id="fLikes" placeholder="Ex: 450" />
        </div>
        <div class="lux-field">
          <label>Comentários (Aprox)</label>
          <input type="text" class="lux-input" id="fComments" placeholder="Ex: 22" />
        </div>
      </div>

      <div class="lux-field">
        <label>Frequência de Posts</label>
        <input type="text" class="lux-input" id="fFrequency" placeholder="Ex: 3x por semana" />
      </div>

      <div class="lux-field">
        <label>Sobre o que fala nas legendas?</label>
        <textarea class="lux-input" id="fCaptions" placeholder="Descreva o tom e tópicos das legendas" style="min-height: 80px; resize: vertical;"></textarea>
      </div>

      <div class="lux-field">
        <label>Tipos de Conteúdo</label>
        <div class="tags-cloud">
          <button class="tag-btn content-tag" onclick="toggleTag(this)">Antes e Depois</button>
          <button class="tag-btn content-tag" onclick="toggleTag(this)">Lifestyle</button>
          <button class="tag-btn content-tag" onclick="toggleTag(this)">Educativo</button>
          <button class="tag-btn content-tag" onclick="toggleTag(this)">Reels</button>
          <button class="tag-btn content-tag" onclick="toggleTag(this)">Depoimentos</button>
          <button class="tag-btn content-tag" onclick="toggleTag(this)">Carrossel</button>
        </div>
      </div>

      <div class="lux-field">
        <label>Observações Visuais</label>
        <textarea class="lux-input" id="fObservations" placeholder="Qualidade das fotos, layout, consistência visual..." style="min-height: 80px; resize: vertical;"></textarea>
      </div>

      <div class="btn-submit-container">
        <button class="btn-grand" id="btnAnalyze" onclick="generateReport()">Gerar Análise Premium</button>
      </div>
    </div>

    <div class="profile-hero" id="profileCard">
      <div class="avatar-frame" id="avatarWrap"></div>
      <h2 class="ph-name" id="pName"></h2>
      <div class="ph-meta" id="pCat"></div>
      <p class="ph-bio" id="pBio"></p>
    </div>

    <div class="dossier-view" id="reportSection">
      <div class="editorial-divider">ANÁLISE ESTRATÉGICA</div>
      <div class="report-grid" id="reportCards"></div>
      <div class="whatsapp-cta">
        <p>"Sugestões personalizadas e plano de ação completo para seu perfil"</p>
        <a href="https://wa.me/5511916391848?text=Quero%20minhas%20sugestões%20de%20conteúdo%20para%20o%20Instagram" target="_blank" class="whatsapp-btn">
          Falar com Especialista
        </a>
      </div>
    </div>
  </div>

  <footer>
    Dermabrand &copy; 2026 — The Premium Praxis
  </footer>

  <script>
    let globProfilePic = '';
    let globUsername = '';
    let globIsVerified = false;
    let globCategory = '';

    function extractUsername(input) {
      input = input.trim();
      const m = input.match(/instagram\.com\/([^/?#\s]+)/);
      if (m) return m[1].replace(/\/$/, '');
      return input.replace(/^@/, '').trim();
    }

    function toggleDisplay(id, display) {
      document.getElementById(id).style.display = display;
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.style.display = 'block';
      el.textContent = msg;
      toggleDisplay('progressSection', 'none');
      document.getElementById('btnSearch').disabled = false;
      document.getElementById('btnSearch').textContent = 'Tentar Novamente';
    }

    function toggleTag(el) {
      el.classList.toggle('selected');
    }

    function parseSection(text, title) {
      const escapedTitle = title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`[#\\*\\s]*${escapedTitle}[#\\*\\s]*([\\s\\S]*?)(?=\\n[#\\*\\s]*\\d\\.|$)`, 'i');
      const match = text.match(regex);
      return match ? match[1].trim() : '';
    }

    async function fetchProfileData() {
      const input = document.getElementById('igInput').value.trim();
      if (!input) return;
      const username = extractUsername(input);
      if (!username) {
        showError('Username inválido.');
        return;
      }

      document.getElementById('igInput').blur();
      document.getElementById('btnSearch').disabled = true;
      document.getElementById('btnSearch').textContent = 'Buscando...';

      toggleDisplay('errorBox', 'none');
      toggleDisplay('formSection', 'none');
      toggleDisplay('profileCard', 'none');
      toggleDisplay('reportSection', 'none');
      toggleDisplay('progressSection', 'block');

      try {
        const r = await fetch(`/api/profile?username=${encodeURIComponent(username)}`);
        const d = await r.json();
        if (!d.ok) throw new Error(d.error || 'Perfil não encontrado.');

        const p = d.user;
        globUsername = p.username || username;
        globProfilePic = p.profile_pic_url || '';
        globIsVerified = p.is_verified || false;
        globCategory = p.category || '';

        document.getElementById('fName').value = p.full_name || globUsername;
        document.getElementById('fSpecialty').value = globCategory;
        document.getElementById('fBio').value = p.biography || '';
        document.getElementById('fFollowers').value = parseInt(p.follower_count || 0);

        ['fCity', 'fLikes', 'fComments', 'fFrequency', 'fCaptions', 'fObservations'].forEach(id => {
          document.getElementById(id).value = '';
        });
        document.querySelectorAll('.content-tag').forEach(t => t.classList.remove('selected'));

        setTimeout(() => {
          toggleDisplay('progressSection', 'none');
          toggleDisplay('formSection', 'block');
          document.getElementById('searchBox').style.display = 'none';
          document.getElementById('errorBox').style.display = 'none';
        }, 600);
      } catch (e) {
        showError('Erro: ' + e.message);
      }
    }

    async function generateReport() {
      toggleDisplay('errorBox', 'none');
      toggleDisplay('formSection', 'none');
      document.getElementById('btnAnalyze').disabled = true;
      toggleDisplay('progressSection', 'block');

      const profileData = {
        full_name: document.getElementById('fName').value,
        username: globUsername,
        specialty: document.getElementById('fSpecialty').value,
        city: document.getElementById('fCity').value,
        biography: document.getElementById('fBio').value,
        follower_count: document.getElementById('fFollowers').value,
        likes: document.getElementById('fLikes').value,
        comments: document.getElementById('fComments').value,
        frequency: document.getElementById('fFrequency').value,
        captions: document.getElementById('fCaptions').value,
        observations: document.getElementById('fObservations').value,
        is_verified: globIsVerified,
        profile_pic_url: globProfilePic
      };

      const contentTypes = Array.from(document.querySelectorAll('.content-tag.selected'))
        .map(el => el.textContent);

      try {
        const r = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ profile: profileData, contentTypes }),
        });
        const d = await r.json();
        if (!d.ok) throw new Error(d.error || 'Erro ao gerar análise');
        buildFinalView(profileData, d.report);
      } catch (e) {
        toggleDisplay('formSection', 'block');
        showError('Erro na análise: ' + e.message);
      }
    }

    function buildFinalView(p, text) {
      const avatarWrap = document.getElementById('avatarWrap');
      if (globProfilePic) {
        avatarWrap.innerHTML = `<img src="${globProfilePic}" class="avatar-img" onerror="this.outerHTML='<div class=\\'avatar-letter\\'>${p.full_name.charAt(0).toUpperCase()}</div>'">`;
      } else {
        avatarWrap.innerHTML = `<div class="avatar-letter">${p.full_name.charAt(0).toUpperCase()}</div>`;
      }

      document.getElementById('pName').innerHTML = p.full_name + (globIsVerified ? ' <span style="font-size:0.5em;">✓</span>' : '');
      document.getElementById('pCat').textContent = (p.specialty || 'Médico') + (p.city ? ' • ' + p.city : '');
      document.getElementById('pBio').textContent = p.biography;

      toggleDisplay('profileCard', 'block');

      const sections = [
        "1. POSICIONAMENTO E AUTORIDADE",
        "2. ANÁLISE DA BIO",
        "3. ANÁLISE DE CONTEÚDO",
        "4. ENGAJAMENTO E PERFORMANCE",
        "5. ERROS E GARGALOS",
        "6. PLANO DE MELHORIA"
      ];

      const formatBody = (str) => {
        return str
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.*?)\*/g, '<em>$1</em>')
          .replace(/\n/g, '<br>')
          .trim();
      };

      const blocksHtml = sections.map((title, i) => {
        let content = parseSection(text, title);
        if (!content) return '';

        let visualTitle = title.replace(/^\d\.\s*/, '');

        return `<div class="report-card">
          <h3 class="rc-title"><div class="rc-number">${i + 1}</div> ${visualTitle}</h3>
          <div class="rc-body">${formatBody(content)}</div>
        </div>`;
      }).join('');

      document.getElementById('reportCards').innerHTML = blocksHtml;
      toggleDisplay('reportSection', 'block');
      toggleDisplay('progressSection', 'none');
    }

    document.getElementById('igInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchProfileData();
    });
  </script>
</body>
</html>
